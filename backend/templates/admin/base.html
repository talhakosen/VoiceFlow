<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VoiceFlow Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .stat-card { border-left: 4px solid #0d6efd; }
        .stat-card.green { border-left-color: #198754; }
        .stat-card.yellow { border-left-color: #ffc107; }
        .stat-card.purple { border-left-color: #6f42c1; }
        .badge-role-admin { background-color: #0d6efd; }
        .badge-role-superadmin { background-color: #6f42c1; }
        .badge-role-member { background-color: #6c757d; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">VoiceFlow Admin</span>
        <span class="navbar-text text-white-50 small">Tenant: <strong class="text-white">{{ tenant_id }}</strong></span>
    </div>
</nav>
<div class="container-lg">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
