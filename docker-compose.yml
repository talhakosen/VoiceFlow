services:
  voiceflow-api:
    build: ./backend
    ports:
      - "8765:8765"
    volumes:
      - voiceflow-db:/data/db
      - voiceflow-models:/data/models
    environment:
      BACKEND_MODE: server
      DB_PATH: /data/db/voiceflow.db
      CHROMA_PATH: /data/db/chroma
      JWT_SECRET: ${JWT_SECRET}
      API_KEYS: ${API_KEYS}
      WHISPER_MODEL: ${WHISPER_MODEL:-Systran/faster-whisper-large-v3}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-http://ollama:11434}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - voiceflow-models:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

volumes:
  voiceflow-db:
  voiceflow-models:
