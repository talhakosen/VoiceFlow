# VoiceFlow — App Configuration
# Non-secret settings. Secrets (API keys, tokens) → .env

backend:
  mode: local          # local | server
  db_path: voiceflow.db  # relative → repo root; absolute also works

llm:
  backend: mlx         # mlx | ollama
  endpoint: ""         # Ollama endpoint; empty = local MLX
  model: qwen2.5:7b    # Ollama model name
  adapter_path: ml/qwen/adapters/v3.0  # LoRA adapter; empty = no adapter. Versiyon geçmişi: ml/qwen/CHANGELOG.md
  adapter_version: "3.0"
  adapter_trained_at: "2026-04-04"

whisper:
  #model: mlx-community/whisper-large-v3-turbo  # base
  model: ml/whisper/models/v2.0  # Versiyon geçmişi: ml/whisper/CHANGELOG.md
  server_model: large-v3  # faster-whisper (server mode) — NVIDIA GPU, kurumsal merkezi sunucu için. Mac local modunda kullanılmaz.
  it_model: ""  # IT/mühendislik modu fine-tuned model; boş = base model kullan. Örn: ml/whisper/models/voiceflow-whisper-it

auth:
  jwt_access_ttl_minutes: 60

security:
  # Rate limiting — "N/period" (minute | hour | day)
  rate_limit_default: "60/minute"   # genel API endpoint'leri
  rate_limit_stop:    "30/minute"   # POST /api/stop — transkripsiyon tetikler
  rate_limit_auth:    "10/minute"   # POST /auth/login — brute-force koruması
  # CORS — virgülle ayrılmış origin'ler; "*" = herkese açık (local dev)
  # Server modunda değiştir: "https://app.firma.com,https://admin.firma.com"
  cors_origins: "*"

logging:
  file: /tmp/voiceflow.log
  max_bytes: 10485760   # 10 MB
  backup_count: 5       # voiceflow.log, voiceflow.log.1, ..., voiceflow.log.5
