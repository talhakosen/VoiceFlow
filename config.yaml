# VoiceFlow — App Configuration
# Non-secret settings. Secrets (API keys, tokens) → .env

backend:
  mode: local          # local | server
  db_path: voiceflow.db  # relative → repo root; absolute also works

llm:
  backend: mlx         # mlx | ollama
  endpoint: ""         # Ollama endpoint; empty = local MLX
  model: qwen2.5:7b    # Ollama model name
  adapter_path: ml/qwen/adapters/v2.0  # LoRA adapter; empty = no adapter. Versiyon geçmişi: ml/qwen/CHANGELOG.md
  adapter_version: "2.0"
  adapter_trained_at: "2026-04-04"

whisper:
  #model: mlx-community/whisper-large-v3-turbo  # base
  model: ml/whisper/models/voiceflow-whisper-tr-v2-mlx  # Stage 2: noktalama + büyük harf (ISSAI 164K + Qwen GT)
  server_model: large-v3  # faster-whisper (server mode) — NVIDIA GPU, kurumsal merkezi sunucu için. Mac local modunda kullanılmaz.

auth:
  jwt_access_ttl_minutes: 60
